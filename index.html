<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <!-- Ana Sol Menü (Global Sidebar) -->
    <nav class="global-sidebar">
        <div class="sidebar-header">
            <h2>Panel</h2>
        </div>
        <div class="nav-links">
            <button id="nav-konusmalar" class="nav-btn active">
                <span class="icon">💬</span> Konuşmalar
            </button>
            <button id="nav-randevular" class="nav-btn">
                <span class="icon">📅</span> Randevu Ekranı
            </button>
        </div>
    </nav>

    <!-- Sağ İçerik Alanı -->
    <div class="main-wrapper">
        <header class="header">
            <h1 id="page-title">Konuşmalar</h1>
        </header>
        
        <!-- GÖRÜNÜM 1: KONUŞMALAR -->
        <main id="view-konusmalar" class="container">
            <!-- Konuşma Listesi -->
            <section id="conversation-list" class="list-section">
                <div id="list-container" class="card-container">
                    <p class="loading">Veriler yükleniyor...</p>
                </div>
            </section>

            <!-- Konuşma Detayı (Sağ Taraf) -->
            <section id="conversation-detail" class="detail-section hidden-desktop">
                <div class="detail-header">
                    <button id="back-btn" class="btn">← Geri</button>
                    <h2 id="detail-title">Lütfen bir konuşma seçin</h2>
                </div>
                <div id="detail-container" class="messages-container">
                    <!-- Mesajlar buraya gelecek -->
                </div>
            </section>
        </main>

        <!-- GÖRÜNÜM 2: RANDEVULAR -->
        <main id="view-randevular" class="container hidden-view">
            <div class="placeholder-content">
                <h2>📅 Randevu Ekranı</h2>
                <p>Randevu modülü buraya eklenecektir. Şu an yapım aşamasında.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
